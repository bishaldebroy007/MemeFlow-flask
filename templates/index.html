<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeFlow · Fresh Memes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5), 0 8px 20px -8px rgba(0, 0, 0, 0.3);
            max-width: 780px;
            width: 100%;
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.2s ease;
        }

        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        h1 {
            color: #f0f3fa;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1 span {
            background: #3b82f6;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .subreddit-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .subreddit-badge::before {
            content: "🧵";
            font-size: 1.1rem;
        }

        .meme-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
            padding: 0.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meme-image {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 1.2rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            transition: opacity 0.2s;
            background: #1e293b;
        }

        .button-group {
            display: flex;
            justify-content: center;
        }

        .btn-next {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 0.9rem 2.5rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 10px 20px -8px #1e3a8a80, 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .btn-next:hover {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            transform: scale(1.02);
            box-shadow: 0 16px 24px -8px #1e3a8a;
        }

        .btn-next:active {
            transform: scale(0.98);
            box-shadow: 0 6px 12px -4px #0f172a;
        }

        .btn-next i {
            font-size: 1.3rem;
            line-height: 1;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* subtle loading / fallback */
        .meme-image[src=""] {
            background: #334155;
            min-height: 280px;
        }
    </style>
    <!-- optional: add icon library for a little spark -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="card">
        <div class="header">
            <h1>
                MemeFlow
                <span>fresh</span>
            </h1>
            <div class="subreddit-badge">
                r/{{ subreddit }}
            </div>
        </div>

        <div class="meme-container">
            <img class="meme-image" src="{{ meme_large }}" alt="Meme from r/{{ subreddit }}" loading="lazy">
        </div>

        <div class="button-group">
            <button class="btn-next" onclick="window.location.reload();">
                <i class="fas fa-dice-d6"></i>
                Next Meme
                <i class="fas fa-arrow-right" style="font-size: 1rem; margin-left: 4px;"></i>
            </button>
        </div>

        <div class="footer-note">
            ⚡ fresh from Reddit • click to roll the dice
        </div>
    </div>

    <!-- fallback in case the image fails to load (optional) -->
    <script>
        (function () {
            const img = document.querySelector('.meme-image');
            img.addEventListener('error', function () {
                // If the meme fails, show a placeholder (rare with meme-api)
                this.src = 'https://via.placeholder.com/600x400/1e293b/94a3b8?text=😅+Meme+loading+failed.+Try+again.';
                this.style.objectFit = 'cover';
            });
        })();
    </script>
</body>

</html>
